{% extends "base.html" %}

{% block title %}Sign in - Google Accounts{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="logo">
        <svg viewBox="0 0 75 24" width="75" height="24" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.1 5.4v2h5.1c-.2 1.1-1.3 3.3-5.1 3.3-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l1.6-1.6c-1-1-2.4-1.9-5.4-1.9-4.4 0-8 3.6-8 8s3.6 8 8 8c4.6 0 7.7-3.2 7.7-7.8 0-.5-.1-.9-.2-1.3H7.1z" fill="#4285F4"/>
            <path d="M19.1 8.2c-2.4 0-4.3 1.8-4.3 4.3s1.9 4.3 4.3 4.3 4.3-1.8 4.3-4.3-1.9-4.3-4.3-4.3zm0 6.9c-1.3 0-2.4-1.1-2.4-2.6s1.1-2.6 2.4-2.6 2.4 1.1 2.4 2.6-1.1 2.6-2.4 2.6z" fill="#EA4335"/>
            <path d="M28.6 8.2c-2.4 0-4.3 1.8-4.3 4.3s1.9 4.3 4.3 4.3 4.3-1.8 4.3-4.3-1.9-4.3-4.3-4.3zm0 6.9c-1.3 0-2.4-1.1-2.4-2.6s1.1-2.6 2.4-2.6 2.4 1.1 2.4 2.6-1.1 2.6-2.4 2.6z" fill="#FBBC05"/>
            <path d="M37.6 8.2c-2.3 0-4.2 1.9-4.2 4.3s1.9 4.3 4.2 4.3c1.2 0 2.1-.5 2.7-1.1h.1v.9c0 1.6-1 2.5-2.4 2.5-1.2 0-1.9-.9-2.2-1.6l-1.9.8c.6 1.3 2 2.7 4.1 2.7 2.3 0 4.2-1.4 4.2-4.5V8.5h-1.8v.8h-.1c-.5-.6-1.5-1.1-2.7-1.1zm-.2 6.9c-1.3 0-2.3-1.1-2.3-2.6s1-2.6 2.3-2.6 2.3 1.1 2.3 2.6-1 2.6-2.3 2.6z" fill="#4285F4"/>
            <path d="M43.7.3h2v16.1h-2z" fill="#34A853"/>
            <path d="M51.8 8.2c-2 0-3.8 1-4.5 2.5l1.8.8c.4-.9 1.4-1.5 2.6-1.5 1.5 0 2.4.9 2.4 2.1v.2l-2.8 1.1c-2.4 1-3.9 2.5-3.9 4.6 0 2.1 1.8 3.5 3.9 3.5 1.7 0 2.9-.8 3.5-1.7h.1v1.4h1.8v-6.3c.1-3.3-2.3-4.7-4.9-4.7zm-.2 6.9c-.7 0-1.4-.4-1.4-1.1 0-1 1-1.6 2.3-2.1l1.5-.6v.6c0 1.9-1.3 3.2-2.4 3.2z" fill="#EA4335"/>
        </svg>
    </div>
    <h1>Sign in</h1>
    <p class="subtitle">Use your Google Account</p>
    
    <form action="/login" method="POST">
        <div class="form-group">
            <input type="email" id="email" name="email" placeholder=" " required>
            <label for="email">Email or phone</label>
        </div>
        
        <a href="#" class="forgot-password">Forgot email?</a>
        
        <div class="form-group" style="margin-bottom: 8px;">
            <p style="font-size: 14px; color: var(--google-gray); text-align: left;">Not your computer? Use Guest mode to sign in privately. <a href="#" style="color: var(--google-blue); text-decoration: none; font-weight: 500;">Learn more</a></p>
        </div>
        
        <div class="footer-actions">
            <a href="/signup" class="create-account">Create account</a>
            <button type="submit" class="btn-next">Next</button>
        </div>
    </form>
    
    <div style="margin-top: 32px; border-top: 1px solid var(--google-border); padding-top: 24px;">
        <a href="/auth/login/google" class="google-btn">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
                <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.172.282-1.712V4.956H.957a8.996 8.996 0 000 8.088l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.956l3.007 2.332c.708-2.127 2.692-3.711 5.036-3.711z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </a>
    </div>
</div>
{% endblock %}
